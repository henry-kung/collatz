<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collatz Conjecture Visualizer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            max-width: 900px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #667eea;
            text-align: center;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .description {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .input-section {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        input[type="number"] {
            padding: 12px 20px;
            border: 2px solid #667eea;
            border-radius: 10px;
            font-size: 16px;
            width: 200px;
            transition: border-color 0.3s;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: #764ba2;
        }

        button {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: 600;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .speed-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 30px;
            color: #666;
            font-size: 14px;
        }

        .speed-section input[type="range"] {
            width: 140px;
            accent-color: #667eea;
        }

        #speedLabel {
            display: inline-block;
            width: 70px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.8em;
            font-weight: bold;
        }

        .canvas-container {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        canvas {
            width: 100%;
            height: 400px;
            border-radius: 5px;
        }

        /* live step counter overlay */
        #stepCounter {
            position: absolute;
            top: 28px;
            right: 28px;
            background: rgba(102, 126, 234, 0.15);
            color: #667eea;
            font-weight: 700;
            font-size: 13px;
            padding: 4px 10px;
            border-radius: 6px;
            pointer-events: none;
        }

        .sequence {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            max-height: 200px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.8;
            color: #333;
        }

        .sequence::-webkit-scrollbar {
            width: 8px;
        }

        .sequence::-webkit-scrollbar-track {
            background: #e0e0e0;
            border-radius: 10px;
        }

        .sequence::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }

        .error {
            color: #e74c3c;
            text-align: center;
            margin-top: 10px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔢 Collatz Conjecture</h1>
        <p class="description">
            Enter a positive integer to visualize its Collatz sequence. The conjecture states that 
            every sequence eventually reaches 1, following: if n is even, divide by 2; if odd, multiply by 3 and add 1.
        </p>

        <div class="input-section">
            <input type="number" id="numberInput" placeholder="Enter a number" min="1" value="27">
            <button id="visualizeBtn" onclick="visualize()">Visualize</button>
            <button id="skipBtn" onclick="skipAnimation()" style="display:none">Skip</button>
        </div>

        <div class="speed-section">
            <span>Speed:</span>
            <input type="range" id="speedSlider" min="1" max="5" value="3">
            <span id="speedLabel">Normal</span>
        </div>

        <div id="error" class="error"></div>

        <div id="stats" class="stats" style="display: none;">
            <div class="stat-box">
                <div class="stat-label">Starting Number</div>
                <div class="stat-value" id="startNum">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Steps to 1</div>
                <div class="stat-value" id="steps">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Max Value</div>
                <div class="stat-value" id="maxVal">0</div>
            </div>
        </div>

        <div class="canvas-container" id="canvasContainer" style="display: none;">
            <canvas id="chart"></canvas>
            <div id="stepCounter"></div>
        </div>

        <div class="sequence" id="sequence" style="display: none;"></div>
    </div>

    <script>
        // Speed slider label mapping
        const speedLabels = ['Very Slow', 'Slow', 'Normal', 'Fast', 'Very Fast'];
        // Steps drawn per second at each speed level (last entry = instant/skip)
        const stepsPerSecond = [10, 30, 60, 300, Infinity];

        document.getElementById('speedSlider').addEventListener('input', function() {
            document.getElementById('speedLabel').textContent = speedLabels[this.value - 1];
        });

        function collatzSequence(n) {
            const sequence = [n];
            while (n !== 1) {
                if (n % 2 === 0) {
                    n = n / 2;
                } else {
                    n = 3 * n + 1;
                }
                sequence.push(n);
            }
            return sequence;
        }

        // Animation state
        let animationId = null;
        let currentSequence = [];
        let animationIndex = 0;
        let chartCtx = null;
        let chartDims = {};
        let lastTimestamp = null;
        let stepAccumulator = 0;

        function visualize() {
            const input = document.getElementById('numberInput').value;
            const errorDiv = document.getElementById('error');
            const num = parseInt(input);

            errorDiv.textContent = '';

            if (!input || num < 1 || !Number.isInteger(num)) {
                errorDiv.textContent = 'Please enter a valid positive integer';
                return;
            }

            if (num > 9999999) {
                errorDiv.textContent = 'Please enter a number less than 9,999,999';
                return;
            }

            // Cancel any running animation
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
            lastTimestamp = null;
            stepAccumulator = 0;

            currentSequence = collatzSequence(num);
            const maxValue = Math.max(...currentSequence);

            document.getElementById('stats').style.display = 'grid';
            document.getElementById('canvasContainer').style.display = 'block';
            document.getElementById('sequence').style.display = 'none'; // shown after animation
            document.getElementById('skipBtn').style.display = '';
            document.getElementById('visualizeBtn').disabled = true;

            document.getElementById('startNum').textContent = num.toLocaleString();
            document.getElementById('steps').textContent = currentSequence.length - 1;
            document.getElementById('maxVal').textContent = maxValue.toLocaleString();

            setupChart(currentSequence);
            animationIndex = 0;
            requestAnimationFrame(animate);
        }

        function setupChart(sequence) {
            const canvas = document.getElementById('chart');
            const dpr = window.devicePixelRatio || 1;

            canvas.width = canvas.offsetWidth * dpr;
            canvas.height = canvas.offsetHeight * dpr;

            chartCtx = canvas.getContext('2d');
            chartCtx.scale(dpr, dpr);

            const width = canvas.offsetWidth;
            const height = canvas.offsetHeight;
            const padding = 50;
            const maxValue = Math.max(...sequence);
            const xStep = (width - padding * 2) / Math.max(1, sequence.length - 1);
            const yScale = (height - padding * 2) / maxValue;

            chartDims = { width, height, padding, maxValue, xStep, yScale };

            // Draw axes and labels once
            drawAxes();
        }

        function drawAxes() {
            const { ctx, width, height, padding, maxValue } = { ctx: chartCtx, ...chartDims };

            ctx.strokeStyle = '#ddd';
            ctx.lineWidth = 1;

            // X axis
            ctx.beginPath();
            ctx.moveTo(padding, height - padding);
            ctx.lineTo(width - padding, height - padding);
            ctx.stroke();

            // Y axis
            ctx.beginPath();
            ctx.moveTo(padding, padding);
            ctx.lineTo(padding, height - padding);
            ctx.stroke();

            // Labels
            ctx.fillStyle = '#666';
            ctx.font = '12px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('0', padding, height - padding + 20);
            ctx.fillText(currentSequence.length - 1, width - padding, height - padding + 20);

            ctx.textAlign = 'right';
            ctx.fillText(maxValue.toLocaleString(), padding - 8, padding + 4);
            ctx.fillText('0', padding - 8, height - padding);

            // Axis titles
            ctx.fillStyle = '#999';
            ctx.font = '11px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('Step', width / 2, height - 4);
        }

        function getPoint(index) {
            const { padding, height, xStep, yScale } = chartDims;
            const x = padding + index * xStep;
            const y = height - padding - currentSequence[index] * yScale;
            return { x, y };
        }

        function animate(timestamp) {
            const speed = parseInt(document.getElementById('speedSlider').value);
            const rate = stepsPerSecond[speed - 1];
            const seq = currentSequence;

            // Compute how many steps to draw this frame based on elapsed time
            let batch;
            if (!isFinite(rate)) {
                batch = seq.length; // instant — draw everything
            } else {
                if (lastTimestamp === null) lastTimestamp = timestamp;
                const elapsed = (timestamp - lastTimestamp) / 1000; // seconds
                lastTimestamp = timestamp;
                stepAccumulator += elapsed * rate;
                batch = Math.floor(stepAccumulator);
                stepAccumulator -= batch;
            }

            // Draw batch of segments
            for (let i = 0; i < batch; i++) {
                if (animationIndex >= seq.length - 1) {
                    finishAnimation();
                    return;
                }

                const from = getPoint(animationIndex);
                const to = getPoint(animationIndex + 1);

                // Line segment
                chartCtx.strokeStyle = '#667eea';
                chartCtx.lineWidth = 2;
                chartCtx.beginPath();
                chartCtx.moveTo(from.x, from.y);
                chartCtx.lineTo(to.x, to.y);
                chartCtx.stroke();

                // Dot at new point
                chartCtx.fillStyle = '#764ba2';
                chartCtx.beginPath();
                chartCtx.arc(to.x, to.y, 3, 0, Math.PI * 2);
                chartCtx.fill();

                animationIndex++;
            }

            // Update live step counter
            document.getElementById('stepCounter').textContent = `Step: ${animationIndex}`;

            animationId = requestAnimationFrame(animate);
        }

        function finishAnimation() {
            animationId = null;
            document.getElementById('stepCounter').textContent = '';
            document.getElementById('skipBtn').style.display = 'none';
            document.getElementById('visualizeBtn').disabled = false;
            document.getElementById('sequence').style.display = 'block';
            document.getElementById('sequence').textContent = currentSequence.join(' → ');
        }

        function skipAnimation() {
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }

            // Draw remaining points all at once
            const seq = currentSequence;
            if (animationIndex < seq.length - 1) {
                chartCtx.strokeStyle = '#667eea';
                chartCtx.lineWidth = 2;
                chartCtx.beginPath();
                const from = getPoint(animationIndex);
                chartCtx.moveTo(from.x, from.y);
                for (let i = animationIndex + 1; i < seq.length; i++) {
                    const pt = getPoint(i);
                    chartCtx.lineTo(pt.x, pt.y);
                }
                chartCtx.stroke();

                chartCtx.fillStyle = '#764ba2';
                for (let i = animationIndex + 1; i < seq.length; i++) {
                    const pt = getPoint(i);
                    chartCtx.beginPath();
                    chartCtx.arc(pt.x, pt.y, 3, 0, Math.PI * 2);
                    chartCtx.fill();
                }
            }

            animationIndex = seq.length - 1;
            finishAnimation();
        }

        // Run on load
        visualize();

        document.getElementById('numberInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') visualize();
        });
    </script>
</body>
</html>
